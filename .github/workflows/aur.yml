name: Publish AUR Package

# Fires on push to master (rolling) and on v* tags (clean version).
# Required secrets: AUR_SSH_PRIVATE_KEY, AUR_EMAIL

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  aur:
    runs-on: ubuntu-latest
    container: archlinux:base

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh pacman-contrib

      - uses: actions/checkout@v5

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          # Generate .SRCINFO (makepkg refuses to run as root)
          useradd -m builder
          chown -R builder aur
          su builder -c "cd aur && makepkg --printsrcinfo > .SRCINFO"

          # Set up SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new"

          # Clone AUR repo and explicitly checkout master
          git clone ssh://aur@aur.archlinux.org/yay-sys-tray-git.git /tmp/aur-repo
          cd /tmp/aur-repo
          git checkout master 2>/dev/null || git checkout -b master

          # Copy package files
          cp "$GITHUB_WORKSPACE/aur/PKGBUILD" .
          cp "$GITHUB_WORKSPACE/aur/"*.install .
          cp "$GITHUB_WORKSPACE/aur/.SRCINFO" .

          # Commit and push if there are changes
          git config user.name "skint007"
          git config user.email "$AUR_EMAIL"
          git add PKGBUILD .SRCINFO *.install
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Update PKGBUILD"
            # Force push: AUR history is disposable, and concurrent
            # workflow runs (branch + tag triggers) can race each other.
            git push --force origin master
          fi
