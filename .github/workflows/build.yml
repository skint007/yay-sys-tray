name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    # Tauri build of the Arch Linux tray app — Linux only (the app depends on
    # webkit2gtk / pacman-contrib / yay, so macOS/Windows don't apply).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so a tag build can derive its version

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            patchelf \
            file \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --bundles none

      - name: Assemble release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="0.0.0"
          mkdir -p stage dist-release
          install -Dm755 src-tauri/target/release/yay-sys-tray stage/yay-sys-tray
          install -Dm644 resources/yay-sys-tray.desktop stage/yay-sys-tray.desktop
          install -Dm644 resources/yay-sys-tray.service stage/yay-sys-tray.service
          install -Dm644 LICENSE stage/LICENSE
          tar -czf "dist-release/yay-sys-tray-${VERSION}-x86_64.tar.gz" -C stage .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: dist-release/

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release
          path: dist-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*.tar.gz
          generate_release_notes: true

  aur-bin:
    # Publish the prebuilt package (yay-sys-tray-bin) pointing at the release
    # tarball, with the checksum computed from the exact bytes just released.
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release
          path: dist-release

      - name: Stamp version + checksum into PKGBUILD
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(sha256sum "dist-release/yay-sys-tray-${VERSION}-x86_64.tar.gz" | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/bin/PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA}')|" aur/bin/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: yay-sys-tray-bin
          pkgbuild: ./aur/bin/PKGBUILD
          assets: ./aur/bin/*.install
          commit_username: skint007
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update yay-sys-tray-bin to ${{ github.ref_name }}"
          force_push: true
          allow_empty_commits: false
